<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="/css/style.css">
    <title>Buch ausleihen</title>
</head>


<body class="borrow-page">




<form class="borrow-box" th:action="@{/borrow/{isbn}(isbn=${isbn})}" method="post">

    <h1>Buch ausleihen</h1>

    Benutzer:
    <select class="select" name="userId">
        <option th:each="user : ${users}"
                th:value="${user.id}"
                th:text="${user.name}">
        </option>
    </select>

    <br><br>

    <button class="borrow-button" type="submit">
        Ausleihen
    </button>

</form>

<p th:if="${error}"
   th:text="${error}"
   style="color:red;">
</p>

</body>
</html>
