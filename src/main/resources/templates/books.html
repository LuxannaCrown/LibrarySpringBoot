<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Bücher</title>
</head>

<body>


<h1>Bibliothek - Bücher</h1>


<table border="1">

    <tr>
        <th>ISBN</th>
        <th>Titel</th>
        <th>Autor</th>
        <th>Status</th>
        <th>Aktion</th>
    </tr>


    <tr th:each="book : ${books}">

        <td th:text="${book.isbn}"></td>
        <td th:text="${book.titel}"></td>
        <td th:text="${book.autor}"></td>
        <td th:text="${book.status}"></td>

        <td>
            <form th:action="@{/books/delete/{isbn}(isbn=${book.isbn})}"
                  method="post">

                <button type="submit">
                    Löschen
                </button>

            </form>
        </td>

        <td>
            <a th:href="@{/books/borrow/{isbn}(isbn=${book.isbn})}">Ausleihen</a>
        </td>

    </tr>

    <a href="http://localhost:8080/books/new"><button>Buch hinzufügen</button></a>

</table>


</body>
</html>
